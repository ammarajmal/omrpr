services:
  ros1-noetic:
    build:
      context: .
      dockerfile: Dockerfile.ros1-noetic
    container_name: omrpr_ros1_noetic
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=:0
      - QT_X11_NO_MITSHM=1
      - ROS_MASTER_URI=http://localhost:11311
      - ROS_HOSTNAME=localhost
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /media/ammar/phd/work/omrpr:/workspace/omrpr
      - /media/ammar/phd/work/omrpr-data-private:/workspace/omrpr-data-private
      - /media/ammar/phd/work/omrpr/ros_ws:/catkin_ws
      - /dev:/dev
    stdin_open: true
    tty: true
